// ===================== 新增功能核心代码 =====================
let cur = 0;
const total = questions.length;
let errorQuestions = []; // 错题列表
let completedQuestions = new Set(); // 已完成题目
let studyErrorOnly = false; // 是否仅做错题模式
let errorQuestionIds = []; // 错题ID列表

// 从localStorage加载数据
function loadData() {
    // 加载当前进度
    const savedCur = localStorage.getItem('a350_question_cur');
    if (savedCur !== null) {
        cur = parseInt(savedCur);
    }
    
    // 加载已完成题目
    const savedCompleted = localStorage.getItem('a350_completed_questions');
    if (savedCompleted) {
        completedQuestions = new Set(JSON.parse(savedCompleted));
    }
    
    // 加载错题
    const savedErrors = localStorage.getItem('a350_error_questions');
    if (savedErrors) {
        errorQuestions = JSON.parse(savedErrors);
        errorQuestionIds = errorQuestions.map(q => q.id);
    }
    
    updateProgressInfo();
}

// 保存当前进度到localStorage
function saveProgress() {
    localStorage.setItem('a350_question_cur', cur);
    localStorage.setItem('a350_completed_questions', JSON.stringify([...completedQuestions]));
    localStorage.setItem('a350_error_questions', JSON.stringify(errorQuestions));
}

// 更新进度信息显示
function updateProgressInfo() {
    document.getElementById('completedCount').innerText = completedQuestions.size;
    document.getElementById('errorCount').innerText = errorQuestions.length;
}

// 添加错题
function addToErrorBook(question) {
    // 避免重复添加
    if (!errorQuestionIds.includes(question.id)) {
        errorQuestions.push(question);
        errorQuestionIds.push(question.id);
        saveProgress();
        updateProgressInfo();
    }
}

// 移除错题
function removeFromErrorBook(questionId) {
    errorQuestions = errorQuestions.filter(q => q.id !== questionId);
    errorQuestionIds = errorQuestions.map(q => q.id);
    saveProgress();
    updateProgressInfo();
}

// 打开错题本
function openErrorBook() {
    const modal = document.getElementById('errorModal');
    const errorList = document.getElementById('errorList');
    const emptyTip = document.getElementById('emptyErrorTip');
    
    errorList.innerHTML = '';
    
    if (errorQuestions.length === 0) {
        emptyTip.style.display = 'block';
    } else {
        emptyTip.style.display = 'none';
        errorQuestions.forEach((q, index) => {
            const errorItem = document.createElement('div');
            errorItem.className = 'error-item';
            
            // 构建正确答案显示文本
            let answerText = '';
            if (q.type === 'single') {
                const answerIndex = ['A','B','C','D'].indexOf(q.answer);
                answerText = `正确答案：${q.answer} - ${q.options[answerIndex]}`;
            } else {
                answerText = '正确答案：';
                q.answer.split('').forEach(ans => {
                    const ansIndex = ['A','B','C','D'].indexOf(ans);
                    answerText += `${ans} - ${q.options[ansIndex]}、`;
                });
                answerText = answerText.slice(0, -1);
            }
            
            errorItem.innerHTML = `
                <div class="error-item-title">
                    第${q.id}题：${q.title}
                    <span class="show-answer" onclick="showErrorAnswer(${index})">查看答案</span>
                    <span class="show-answer" style="color:#ef4444" onclick="removeErrorQuestion(${q.id})">移除</span>
                    <span class="show-answer" style="color:#10b981" onclick="gotoErrorQuestion(${q.id})">前往做题</span>
                </div>
                <div class="error-item-options">
                    ${q.options.map((opt, i) => `<div>${['A','B','C','D'][i]}: ${opt}</div>`).join('')}
                </div>
                <div class="error-item-answer" id="errorAnswer_${index}" style="display:none">${answerText}</div>
            `;
            
            errorList.appendChild(errorItem);
        });
    }
    
    modal.style.display = 'flex';
}

// 关闭错题本
function closeErrorBook() {
    document.getElementById('errorModal').style.display = 'none';
}

// 显示错题答案
function showErrorAnswer(index) {
    const answerEl = document.getElementById(`errorAnswer_${index}`);
    answerEl.style.display = answerEl.style.display === 'none' ? 'block' : 'none';
}

// 移除错题
function removeErrorQuestion(questionId) {
    if (confirm('确定要移除这道错题吗？')) {
        removeFromErrorBook(questionId);
        openErrorBook(); // 重新刷新错题本
    }
}

// 跳转到指定错题
function gotoErrorQuestion(questionId) {
    closeErrorBook();
    cur = questions.findIndex(q => q.id === questionId);
    render();
}

// 切换仅做错题模式
function toggleStudyMode() {
    studyErrorOnly = !studyErrorOnly;
    const btn = document.querySelector('.func-btn:not(.error-btn):not(.reset-btn)');
    btn.textContent = studyErrorOnly ? '显示全部题目' : '仅做错题';
    
    // 如果切换到仅做错题模式，跳转到第一个错题
    if (studyErrorOnly && errorQuestions.length > 0) {
        cur = questions.findIndex(q => q.id === errorQuestions[0].id);
    }
    
    render();
    updateNavButtons();
}

// 重置所有进度
function resetProgress() {
    if (confirm('确定要重置所有进度和错题本吗？此操作不可恢复！')) {
        localStorage.removeItem('a350_question_cur');
        localStorage.removeItem('a350_completed_questions');
        localStorage.removeItem('a350_error_questions');
        
        cur = 0;
        completedQuestions.clear();
        errorQuestions = [];
        errorQuestionIds = [];
        studyErrorOnly = false;
        
        const btn = document.querySelector('.func-btn:not(.error-btn):not(.reset-btn)');
        btn.textContent = '仅做错题';
        
        updateProgressInfo();
        render();
    }
}

// 更新导航按钮状态（适配仅做错题模式）
function updateNavButtons() {
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    
    if (!studyErrorOnly) {
        // 正常模式
        prevBtn.disabled = cur === 0;
        nextBtn.disabled = cur === total - 1;
    } else {
        // 仅做错题模式
        const currentErrorIndex = errorQuestionIds.indexOf(questions[cur].id);
        prevBtn.disabled = currentErrorIndex <= 0;
        nextBtn.disabled = currentErrorIndex >= errorQuestionIds.length - 1;
    }
}

// 导航到上一题（适配仅做错题模式）
function goPrev() {
    if (!studyErrorOnly) {
        cur--;
    } else {
        const currentErrorIndex = errorQuestionIds.indexOf(questions[cur].id);
        if (currentErrorIndex > 0) {
            cur = questions.findIndex(q => q.id === errorQuestionIds[currentErrorIndex - 1]);
        }
    }
    render();
}

// 导航到下一题（适配仅做错题模式）
function goNext() {
    if (!studyErrorOnly) {
        cur++;
    } else {
        const currentErrorIndex = errorQuestionIds.indexOf(questions[cur].id);
        if (currentErrorIndex < errorQuestionIds.length - 1) {
            cur = questions.findIndex(q => q.id === errorQuestionIds[currentErrorIndex + 1]);
        }
    }
    render();
}

// 渲染题目
function render(){
    // 如果仅做错题模式且当前题不是错题，跳转到第一个错题
    if (studyErrorOnly && errorQuestions.length > 0 && !errorQuestionIds.includes(questions[cur].id)) {
        cur = questions.findIndex(q => q.id === errorQuestions[0].id);
    }
    
    const q = questions[cur];
    document.getElementById("current").innerText = cur+1;
    document.getElementById("total").innerText = studyErrorOnly ? errorQuestions.length : total;
    document.getElementById("qTitle").innerText = q.title;
    document.getElementById("type").innerText = q.type==="multi"?"多选题":"单选题";

    const opts = document.getElementById("opts");
    opts.innerHTML = "";
    
    // 标记已完成
    completedQuestions.add(q.id);
    saveProgress();
    updateProgressInfo();

    q.options.forEach((t,i)=>{
        const o = document.createElement("div");
        o.className = "opt";
        o.innerText = `${['A','B','C','D'][i]}: ${t}`;
        
        // 如果是错题，添加标记
        if (errorQuestionIds.includes(q.id)) {
            const mark = document.createElement('span');
            mark.className = 'mark-wrong';
            mark.innerText = '错题';
            o.appendChild(mark);
        }
        
        o.onclick = ()=>{
            document.querySelectorAll(".opt").forEach(x=>x.classList.remove("correct","wrong"));
            let ans = q.answer;
            let ok = false;

            if(q.type==="single"){
                let k = ["A","B","C","D"][i];
                ok = k === ans;
            }else{
                let k = ["A","B","C","D"][i];
                ok = ans.includes(k);
            }
            
            o.classList.add(ok?"correct":"wrong");
            
            // 答错时添加到错题本
            if (!ok) {
                addToErrorBook(q);
            } else {
                // 答对时从错题本移除
                removeFromErrorBook(q.id);
            }
        };
        opts.appendChild(o);
    });

    updateNavButtons();
}

// 搜索功能增强（适配仅做错题模式）
function doSearch(){
    const kw = document.getElementById("searchInput").value.toLowerCase();
    const searchQuestions = studyErrorOnly ? errorQuestions : questions;
    
    for(let i=0;i<searchQuestions.length;i++){
        if(searchQuestions[i].title.toLowerCase().includes(kw)){
            cur = questions.findIndex(q => q.id === searchQuestions[i].id);
            render();
            return;
        }
    }
    alert("未找到");
}

function clearSearch(){
    document.getElementById("searchInput").value = "";
}

// 初始化事件绑定
document.getElementById("prev").onclick = goPrev;
document.getElementById("next").onclick = goNext;

// 页面加载时加载数据
window.onload = function() {
    loadData();
    render();
};
</script>
</body>
</html>
